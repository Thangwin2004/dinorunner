<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=Fredoka:wght@400;500;600;700&family=Lexend:wght@400;500;600;700;800;900&family=Lilita+One&family=Nunito:wght@400;700;800;900&family=Outfit:wght@400;500;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/style.css?v=1.3" />
  <title>Bộ Lạc Phiêu Lưu Ký</title>
</head>

<body>
  <div id="app">



    <!-- HTML Splash Screen -->
    <div id="splash-screen">
      <div class="splash-content">
        <div class="splash-spinner"></div>
        <div class="splash-text">ĐANG TẢI...</div>
      </div>
    </div>

    <!-- HTML Gameplay HUD Overlay -->
    <div id="game-hud-overlay" style="display: none;">
      <div id="hud-score">ĐIỂM: 0</div>
      <div id="hud-highscore">KỶ LỤC: 0</div>
      <button id="hud-pause-btn">
        <div class="hud-pause-icon"></div>
      </button>
    </div>

    <!-- HTML Main Menu Overlay -->
    <div id="game-menu-overlay" style="display: none;">
      <div id="menu-title">BỘ LẠC PHIÊU LƯU KÝ</div>
      <div id="menu-highscore">🏆 KỶ LỤC ĐIỂM: 0</div>
      <button id="menu-play-btn">CHƠI NGAY</button>
      <div id="menu-bottom-buttons">
        <button class="menu-bottom-btn" id="menu-btn-achievements"></button>
        <button class="menu-bottom-btn" id="menu-btn-char"></button>
        <button class="menu-bottom-btn" id="menu-btn-instructions"></button>
        <button class="menu-bottom-btn" id="menu-btn-settings"></button>
      </div>
    </div>

    <!-- Pixi Container -->
    <div id="pixi-container"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
